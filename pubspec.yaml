name: devconnect_manage_tool
description: "DevConnect Manage Tool - Desktop debugging & inspection tool for React Native, Flutter, and Android apps"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0-254.0.dev

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Code Generation / Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI
  flex_color_scheme: ^8.1.1
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  multi_split_view: ^3.1.0
  lucide_icons_flutter: ^3.1.11

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  path_provider: ^2.1.5
  window_manager: ^0.4.3
  file_selector_platform_interface: ^2.7.0
  file_selector: ^1.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
