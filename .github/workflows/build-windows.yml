name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release

      - name: Create ZIP
        run: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath DevConnectManageTool-Windows-v1.0.0.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevConnectManageTool-Windows-v1.0.0
          path: build/windows/x64/runner/Release/DevConnectManageTool-Windows-v1.0.0.zip
