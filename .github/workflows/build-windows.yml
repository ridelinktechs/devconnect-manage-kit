name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Flutter master at specific commit
        run: |
          git clone https://github.com/flutter/flutter.git --branch master --single-branch C:\flutter
          cd C:\flutter
          git checkout 221f7eb265
        shell: pwsh

      - name: Add Flutter to PATH
        run: echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - run: flutter doctor -v
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release

      - name: Create Application ZIP (full folder with DLLs)
        run: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath DevConnectManageTool-Windows-v1.0.0.zip
        shell: pwsh

      - name: Copy EXE standalone
        run: |
          copy build\windows\x64\runner\Release\devconnect_manage_tool.exe build\windows\x64\runner\Release\DevConnectManageTool-Windows-v1.0.0.exe
        shell: pwsh

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 build/windows/x64/runner/Release/DevConnectManageTool-Windows-v1.0.0.zip --repo ${{ github.repository }} --clobber
          gh release upload v1.0.0 build/windows/x64/runner/Release/DevConnectManageTool-Windows-v1.0.0.exe --repo ${{ github.repository }} --clobber
        shell: pwsh
