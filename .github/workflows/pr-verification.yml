name: PR Verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Block print/debugPrint in lib/
        run: |
          set -e
          hits=$(grep -rEn '\b(print|debugPrint)\(' lib/ \
            --include='*.dart' \
            --exclude='*.freezed.dart' \
            --exclude='*.g.dart' || true)
          if [ -n "$hits" ]; then
            echo "❌ print()/debugPrint() found in lib/:"
            echo "$hits"
            exit 1
          fi
          echo "✓ No print()/debugPrint() in lib/"
      - run: flutter analyze --no-fatal-infos

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release

  sdk-check:
    name: RN SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd client_sdks/devconnect-react-native && npm install && npm run build
