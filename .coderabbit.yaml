# CodeRabbit Configuration — DevConnect
# Migrated to current schema: https://docs.coderabbit.ai/reference/configuration

# ── Top-level ──────────────────────────────────────────────────────────────

language: "en-US"

tone_instructions: |
  Senior cross-platform reviewer for DevConnect. Focus on cross-platform
  compatibility, body type coverage, storage type coverage, and
  TextComponent usage in detail panels.

# ── Reviews ────────────────────────────────────────────────────────────────

reviews:
  profile: "chill"
  poem: true
  high_level_summary: true

  path_filters:
    - "lib/**"
    - "client_sdks/**"
    - "android/**"
    - "ios/**"
    - "!**/*.g.dart"
    - "!**/*.freezed.dart"
    - "!**/build/**"
    - "!**/.dart_tool/**"

  path_instructions:
    - path: "lib/components/**"
      instructions: |
        - Use TextComponent instead of Text for all selectable text in detail panels
        - Use ColorTokens for colors, never hardcode hex values

    - path: "lib/features/**/presentation/**"
      instructions: |
        - Detail panels must use TextComponent for selectable text
        - Screenshot should use showScreenshotSavedToast from toast_utils
        - Follow ConsumerStatefulWidget + Riverpod patterns
        - Use StableListView for list views

    - path: "lib/core/**"
      instructions: |
        - Providers: StateNotifierProvider + AppPreferences persistence
        - Use AppConstants.monoFontFamily for monospace text

    - path: "lib/server/**"
      instructions: |
        - Storage type parser must handle all 12 types + prefixed formats (mmkv:label)
        - Keep backward compatibility

    - path: "client_sdks/**"
      instructions: |
        - Interceptors must handle FormData/multipart with field + file extraction
        - Use duck-typing for third-party compatibility (no compile-time dependency)
        - Body extraction: try JSON.parse first, fallback to string
        - OkHttp: handle MultipartBody structured
        - HttpURLConnection: capture errorStream

  # Auto-review trigger
  auto_review:
    enabled: true
    auto_incremental_review: true   # was 'incremental: true' in old schema
    drafts: false

  # Linters / static analysis
  tools:
    ast-grep:
      enabled: false
    biome:
      enabled: false
    ruff:
      enabled: false
    dart-analyze:
      enabled: true

# ── Chat ──────────────────────────────────────────────────────────────────

chat:
  auto_reply: true

# ── Knowledge Base ──────────────────────────────────────────────────────────

knowledge_base:
  learnings:
    scope: "auto"
  code_guidelines:
    enabled: true